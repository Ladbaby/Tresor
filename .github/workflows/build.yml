# Tresor cross-platform build and release
#
# Triggers:
#   - push to main branch (or tags v*) → builds, uploads as artifacts
#   - workflow_dispatch with version input → builds, publishes GitHub Release
#
# Targets:
#   Windows amd64 (.exe + .zip)
#   Linux   amd64, arm64 (.gz)
#   macOS   amd64, arm64 (.gz)

name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.1.0)"
        required: true
  push:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "*.md"
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  # ── 1. Build all targets ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { os: windows, arch: amd64 }
          - { os: linux,   arch: amd64 }
          - { os: linux,   arch: arm64 }
          - { os: darwin,  arch: amd64 }
          - { os: darwin,  arch: arm64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify Go
        run: |
          go version
          go env

      - name: Compute version info
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            SHORT=$(git rev-parse --short HEAD)
            BRANCH=${GITHUB_REF_NAME,,}
            VERSION="${BRANCH}-${SHORT}"
          fi
          VERSION="${VERSION//\//-}"
          BUILDTIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "buildtime=$BUILDTIME" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          CGO_ENABLED: 0
        run: |
          BINARY="tresor"
          EXT=""
          if [ "${{ matrix.target.os }}" = "windows" ]; then
            EXT=".exe"
          fi

          go build -trimpath \
            -ldflags "-s -w -X 'tresor/cmd.Version=${{ steps.ver.outputs.version }}' -X 'tresor/cmd.BuildTime=${{ steps.ver.outputs.buildtime }}'" \
            -o "${BINARY}${EXT}" .

          # Output name for artifacts
          NAME="tresor-${{ matrix.target.os }}-${{ matrix.target.arch }}"

          if [ "${{ matrix.target.os }}" = "windows" ]; then
            cp "${BINARY}${EXT}" "${NAME}.exe"
            zip "${NAME}-${{ steps.ver.outputs.version }}.zip" "${NAME}.exe"
          else
            gzip -c "${BINARY}${EXT}" > "${NAME}-${{ steps.ver.outputs.version }}.gz"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: |
            tresor-*.*.exe
            tresor-*.zip
            tresor-*.gz
          retention-days: 7

  # ── 2. Run tests on Linux amd64 ───────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: |
          go clean -testcache
          go test ./...

  # ── 3. Publish GitHub Release (workflow_dispatch only) ────────────
  release:
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Find previous tag
        id: prev
        run: |
          CURRENT="${{ github.event.inputs.version }}"
          PREV=$(git describe --tags --abbrev=0 HEAD^{/^${CURRENT}$/} 2>/dev/null || git tag --sort=-creatordate | head -1)
          echo "prev=$PREV" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          bash .github/gen_release_note.sh \
            -v "${{ steps.prev.outputs.prev }}...${{ github.event.inputs.version }}"
          cat release.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-*"
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Checksums
        working-directory: dist
        run: |
          find . -type f | sort | xargs sha256sum > checksums.txt
          cat checksums.txt

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: |
            dist/*
          body_path: release.md
