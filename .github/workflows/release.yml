# Tresor Release
# Triggered manually via workflow_dispatch with a version tag.
# Builds cross-platform binaries and publishes a GitHub Release.
#
# Targets:
#   Windows amd64 (.exe + .zip)
#   Linux   amd64, arm64 (.gz)
#   macOS   amd64, arm64 (.gz)

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.1.0)"
        required: true

env:
  GO_VERSION: "1.26"

# ── Test (run before building) ──────────────────────────────────────
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: |
          go clean -testcache
          go test ./...

  # ── Build binaries ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        target:
          - { os: windows, arch: amd64 }
          - { os: linux,   arch: amd64 }
          - { os: linux,   arch: arm64 }
          - { os: darwin,  arch: amd64 }
          - { os: darwin,  arch: arm64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Compute version info
        id: ver
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BUILDTIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "buildtime=$BUILDTIME" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          CGO_ENABLED: 0
        run: |
          BINARY="tresor"
          EXT=""
          if [ "${{ matrix.target.os }}" = "windows" ]; then
            EXT=".exe"
          fi

          go build -trimpath \
            -ldflags "-s -w -X 'tresor/cmd.Version=${{ steps.ver.outputs.version }}' -X 'tresor/cmd.BuildTime=${{ steps.ver.outputs.buildtime }}'" \
            -o "${BINARY}${EXT}" .

          # Output name for artifacts
          NAME="tresor-${{ matrix.target.os }}-${{ matrix.target.arch }}"

          if [ "${{ matrix.target.os }}" = "windows" ]; then
            cp "${BINARY}${EXT}" "${NAME}.exe"
            zip "${NAME}-${{ steps.ver.outputs.version }}.zip" "${NAME}.exe"
          else
            gzip -c "${BINARY}${EXT}" > "${NAME}-${{ steps.ver.outputs.version }}.gz"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: |
            tresor-*.*.exe
            tresor-*.zip
            tresor-*.gz
          retention-days: 7

  # ── Publish GitHub Release ────────────────────────────────────────
  release:
    permissions:
      contents: write
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Find previous tag
        id: prev
        run: |
          # Find the previous tag *before* creating the new one.
          # Exclude the current version tag in case it already exists locally.
          PREV=$(git tag --sort=-creatordate | grep -v "^${{ github.event.inputs.version }}$" | head -1)
          if [ -z "$PREV" ]; then
            echo "No previous tag found — listing all commits from repo start."
            echo "prev=ALL" >> $GITHUB_OUTPUT
          else
            echo "Previous tag: $PREV"
            echo "prev=$PREV" >> $GITHUB_OUTPUT
          fi

      - name: Create tag (local only)
        run: |
          git tag ${{ github.event.inputs.version }}

      - name: Generate release notes
        run: |
          if [ "${{ steps.prev.outputs.prev }}" = "ALL" ]; then
            bash .github/gen_release_note.sh -v "...${{ github.event.inputs.version }}"
          else
            bash .github/gen_release_note.sh \
              -v "${{ steps.prev.outputs.prev }}...${{ github.event.inputs.version }}"
          fi
          cat release.md

      - name: Push tag
        run: |
          git push origin ${{ github.event.inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-*"
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Checksums
        working-directory: dist
        run: |
          find . -type f | sort | xargs sha256sum > checksums.txt
          cat checksums.txt

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: |
            dist/*
          body_path: release.md
